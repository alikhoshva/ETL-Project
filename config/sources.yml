datasets:
  - name: movies
    type: csv
    file_path: data/movies.csv
    target_table: stg_movies
    pk: movieId
    schema:
      movieId: int
      title: str
      genres: str
  - name: links
    type: csv
    file_path: data/links.csv
    target_table: stg_links
    pk: movieId
    schema:
      movieId: int
      imdbId: int
      tmdbId: float
  - name: tmdb
    type: json
    file_path: data/tmdb_cache.json
    target_table: stg_tmdb
    pk: id
    schema:
      id: int
      title: str
      budget: float
    



